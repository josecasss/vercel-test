<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset Tracker — IM_ASSET_TRACKING</title>

    <script
        id="sap-ui-bootstrap"
        src="https://ui5.sap.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m,sap.ui.core,sap.ui.layout,sap.f"
        data-sap-ui-resourceroots='{"com.aibel.assettracking": "./"}'
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="trusted">
    </script>

    <style>
        /* ── Camera scan overlay ───────────────────────────────────────── */
        #scanWrapper {
            position: relative;
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            min-height: 200px;
        }
        #scanVideo {
            display: block;
            width: 100%;
            max-height: 360px;
            object-fit: cover;
        }
        #scanOverlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #scanFrame {
            width: 55%;
            aspect-ratio: 1 / 1;
            border: 3px solid #0070f2;
            border-radius: 8px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.48);
            animation: scanPulse 2s ease-in-out infinite;
        }
        @keyframes scanPulse {
            0%, 100% { border-color: #0070f2; }
            50%       { border-color: #00b8d4; }
        }
        #scanLine {
            position: absolute;
            top: 22%;
            left: 22%;
            width: 55%;
            height: 2px;
            background: rgba(0,184,212,0.8);
            box-shadow: 0 0 6px rgba(0,184,212,0.9);
            animation: scanSweep 1.6s linear infinite;
        }
        @keyframes scanSweep {
            0%   { top: 22%; }
            100% { top: 78%; }
        }
        #scanStatus {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            color: #fff;
            font-size: 0.78rem;
            background: rgba(0,0,0,0.55);
            padding: 5px 8px;
        }
        /* hidden canvas for jsQR */
        #scanCanvas { display: none; }

        /* ── Filter bar styling ─────────────────────────────────────────── */
        .atFilterBar {
            background: var(--sapBackgroundColor, #f5f6f7);
            border-bottom: 1px solid var(--sapGroup_TitleBorderColor, #d9d9d9);
            padding: 0.75rem 1rem;
        }
        .atFilterLabel {
            font-size: 0.75rem;
            color: var(--sapContent_LabelColor, #6a6d70);
            margin-bottom: 3px;
            white-space: nowrap;
        }
        .atVariantBar {
            padding: 0.4rem 1rem;
            border-bottom: 1px solid var(--sapGroup_TitleBorderColor, #d9d9d9);
        }
    </style>
</head>
<body class="sapUiBody" id="content">
    <div
        data-sap-ui-component
        data-name="com.aibel.assettracking"
        data-id="container"
        data-settings='{"id":"assettracking"}'>
    </div>
</body>
</html>
